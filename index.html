<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="src/styles/normalize.css" />
    <link rel="stylesheet" href="src/styles/style.css" />
  </head>
  <body>
    <div class="header">
      <img src="images/logo.svg" alt="logo" class="logo" />
      <div class="score">
        <h2>Score</h2>
        <p id="scoreDisplay">0</p>
      </div>
    </div>

    <div class="main">
      <div class="choose itemsContainer">
        <div class="chooseItem item paper">
          <img src="images/icon-paper.svg" alt="paper" />
        </div>
        <div class="chooseItem item scissors">
          <img src="images/icon-scissors.svg" alt="scissors" />
        </div>
        <div class="chooseItem item rock">
          <img src="images/icon-rock.svg" alt="rock" />
        </div>
        <img class="triangle" src="images/bg-triangle.svg" alt="triangle" />
      </div>
      <div class="game itemsContainer hidden">
        <div class="user">
          <div class="image item">
            <img src="" alt="" />
          </div>
          <p class="text">You Picked</p>
        </div>
        <div class="house">
          <div class="image item">
            <img src="" alt="" />
          </div>
          <p class="text">The House Picked</p>
        </div>
      </div>
      <div class="result visHidden">
        <h2 id="resultTitle"></h2>
        <button id="playAgainButton">Play Again</button>
      </div>
    </div>

    <div class="footer">
      <button id="rulesButton">Rules</button>
      <div class="overlay hidden"></div>
      <div class="rules hidden">
        <h2>Rules</h2>
        <img class="rulesImage" src="images/image-rules.svg" alt="rules" />
        <img class="closeButton" src="images/icon-close.svg" alt="close" />
      </div>
    </div>

    <script type="module" src="src/main.js" defer></script>
  </body>
</html>
